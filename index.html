<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fairy Forecast</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="title">Fairy Forecast</div>
<div class="subtitle">Philadelphia Conservatory Conditions</div>

<div class="section">
<div class="label">Weather</div>
<div class="main-line">
<span id="weather-icon">☁️</span>
<span id="weather">Loading weather...</span>
</div>
</div>

<div class="section">
<div class="label">Moon Phase</div>
<div class="main-line">
<span id="moon-icon">🌙</span>
<span id="moon-phase">Loading moon...</span>
</div>
</div>
<div class="oracle" id="oracle-message">
Gathering the morning mist...
</div>
</div>

<script src="script.js"></script>
</body>
</html>
