<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greenhouse Celestial Widget</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">
<div class="sparkles"></div>

<div class="title">✦ Celestial Greenhouse ✦</div>
<div class="subtitle">Philadelphia, PA</div>

<div class="section">
<div class="label">Weather</div>
<div class="main-line">
<span id="weather-icon">☁️</span>
<span id="weather">Loading weather...</span>
</div>
</div>

<div class="section">
<div class="label">Moon Phase</div>
<div class="main-line moon-line">
<span id="moon-icon">🌙</span>
<span id="moon-phase">Loading moon...</span>
</div>
</div>

<div class="oracle" id="oracle-message">
Gathering starlight for the greenhouse...
</div>
</div>

<script src="script.js"></script>
</body>
</html>
